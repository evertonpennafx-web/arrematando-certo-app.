<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Relatório Demo</title>
<style>
body{
background:#111;
color:#fff;
font-family:system-ui;
padding:40px;
max-width:900px;
margin:auto;
}
.card{
background:#1a1a1a;
border:1px solid #333;
padding:20px;
border-radius:14px;
margin-bottom:16px;
}
.ok{color:#3bd671;font-weight:700;}
.warn{color:#ffcc00;font-weight:700;}
.bad{color:#ff4d4d;font-weight:700;}
button{
background:#d4af37;
border:0;
padding:16px 24px;
font-weight:900;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>📊 Resultado da análise do edital</h1>

<div class="card">
✅ Matrícula encontrada<br>
<span class="ok">Sem bloqueio judicial</span>
</div>

<div class="card">
⚠️ Dívida condominial identificada<br>
<span class="warn">R$ 12.800</span>
</div>

<div class="card">
🚨 Ocupação do imóvel detectada<br>
<span class="bad">Pode exigir ação judicial</span>
</div>

<div class="card">
<b>Conclusão automática:</b><br><br>
⚠️ Risco médio — avaliar antes de dar lance
</div>

<br><br>

<a href="/degustacao-gratuita">
<button>ANALISAR MEU EDITAL AGORA</button>
</a>

</body>
</html>
